name: Delta Algo v12

on:
  schedule:
    - cron: "0 */2 * * 1-5"   # Har 2 ghante, Mon-Fri
  workflow_dispatch:            # Manual run bhi kar sakte ho
    inputs:
      mode:
        description: "Mode"
        default: "live"
        type: choice
        options: [live, dry-run, status]

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Run algo
        env:
          DELTA_API_KEY:    ${{ secrets.DELTA_API_KEY }}
          DELTA_API_SECRET: ${{ secrets.DELTA_API_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.mode }}" = "dry-run" ]; then
              python algo.py --dry-run
            elif [ "${{ github.event.inputs.mode }}" = "status" ]; then
              python algo.py --status
            else
              python algo.py
            fi
          else
            python algo.py
          fi
